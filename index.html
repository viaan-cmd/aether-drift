<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>NEON-STRIKE: OMEGA</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Courier New', monospace; }
        #ui { position: absolute; top: 20px; left: 20px; color: #0ff; pointer-events: none; }
        .stat-box { background: rgba(0,20,20,0.8); border: 1px solid #0ff; padding: 10px; margin-bottom: 5px; }
        canvas { display: block; image-rendering: pixelated; }
    </style>
</head>
<body>
    <div id="ui">
        <div class="stat-box">HP: <span id="hp">100</span>%</div>
        <div class="stat-box">COORD: <span id="coord">0,0</span></div>
    </div>
    <canvas id="mainView"></canvas>
<script>
// --- BRANCH 2: CONFIG ---
const CONFIG = {
    TILE: 64,
    MAP_SIZE: 32,
    FOV: Math.PI / 3,
    MAX_DEPTH: 1000
};

const WorldBranch = {
    grid: [],
    generate() {
        for(let y = 0; y < CONFIG.MAP_SIZE; y++) {
            this.grid[y] = [];
            for(let x = 0; x < CONFIG.MAP_SIZE; x++) {
                const isEdge = (x === 0 || x === CONFIG.MAP_SIZE-1 || y === 0 || y === CONFIG.MAP_SIZE-1);
                this.grid[y][x] = (isEdge || Math.random() < 0.1) ? Math.floor(Math.random() * 3) + 1 : 0;
            }
        }
        this.grid[1][1] = 0; this.grid[1][2] = 0; this.grid[2][1] = 0;
    }
};
WorldBranch.generate();
</script>
<script>
// --- BRANCH 3: PHYSICS ---
const InputBranch = {
    keys: {},
    init() {
        window.onkeydown = e => this.keys[e.code] = true;
        window.onkeyup = e => this.keys[e.code] = false;
    }
};
InputBranch.init();

const PlayerBranch = {
    x: 96, y: 96, dir: 0, hp: 100,
    update() {
        let move = 0;
        if(InputBranch.keys['KeyW']) move = 3.5;
        if(InputBranch.keys['KeyS']) move = -2.5;
        if(InputBranch.keys['KeyA']) this.dir -= 0.05;
        if(InputBranch.keys['KeyD']) this.dir += 0.05;

        let nx = this.x + Math.cos(this.dir) * move;
        let ny = this.y + Math.sin(this.dir) * move;

        if(WorldBranch.grid[Math.floor(ny/CONFIG.TILE)][Math.floor(nx/CONFIG.TILE)] === 0) {
            this.x = nx; this.y = ny;
        }
        document.getElementById('coord').innerText = `${Math.floor(this.x)},${Math.floor(this.y)}`;
    }
};
</script>
<script>
// --- BRANCH 4: ENTITIES ---
const EntityBranch = {
    collection: [],
    spawn(x, y, type) { this.collection.push({ x, y, type }); }
};
// Spawn some initial items
EntityBranch.spawn(200, 200, 'battery');
EntityBranch.spawn(400, 300, 'chip');
</script>
<script>
// --- BRANCH 5: RENDERER ---
const RenderBranch = {
    canvas: document.getElementById('mainView'),
    ctx: document.getElementById('mainView').getContext('2d'),
    init() {
        this.canvas.width = window.innerWidth;
        this.canvas.height = window.innerHeight;
    },
    draw() {
        const w = this.canvas.width, h = this.canvas.height;
        this.ctx.fillStyle = '#001'; this.ctx.fillRect(0, 0, w, h/2);
        this.ctx.fillStyle = '#111'; this.ctx.fillRect(0, h/2, w, h/2);

        for(let i = 0; i < w; i += 2) {
            let ra = (PlayerBranch.dir - CONFIG.FOV/2) + (i / w) * CONFIG.FOV;
            let d = 0, hit = 0, cx = Math.cos(ra), cy = Math.sin(ra);
            while(d < CONFIG.MAX_DEPTH) {
                d += 2;
                let tx = Math.floor((PlayerBranch.x + cx * d) / CONFIG.TILE);
                let ty = Math.floor((PlayerBranch.y + cy * d) / CONFIG.TILE);
                if(WorldBranch.grid[ty] && WorldBranch.grid[ty][tx] > 0) { hit = WorldBranch.grid[ty][tx]; break; }
            }
            let z = d * Math.cos(ra - PlayerBranch.dir);
            let wh = (CONFIG.TILE * h) / z;
            let s = Math.max(0, 255 - z/3);
            this.ctx.fillStyle = `rgb(0, ${s/2}, ${s})`;
            this.ctx.fillRect(i, (h - wh)/2, 2, wh);
        }
    }
};
RenderBranch.init();
</script>
<script>
// --- BRANCH 7: ENEMY AI ---
const EnemyBranch = {
    enemies: [],
    spawn(x, y) {
        this.enemies.push({ x, y, hp: 100, speed: 1.5 });
    },
    update() {
        this.enemies.forEach(en => {
            let dx = PlayerBranch.x - en.x;
            let dy = PlayerBranch.y - en.y;
            let dist = Math.hypot(dx, dy);
            
            if(dist > 30) {
                en.x += (dx / dist) * en.speed;
                en.y += (dy / dist) * en.speed;
            } else {
                PlayerBranch.hp -= 0.1;
            }
        });
    }
};

// Spawn one enemy to start
EnemyBranch.spawn(300, 300);
</script>
<script>
// --- BRANCH 8: COMBAT SYSTEM (WEAPONS) ---
const CombatBranch = {
    projectiles: [],
    canShoot: true,
    init() {
        window.addEventListener('mousedown', () => this.shoot());
        window.addEventListener('keydown', e => { if(e.code === 'Space') this.shoot(); });
    },
    shoot() {
        if(!this.canShoot) return;
        this.projectiles.push({
            x: PlayerBranch.x, y: PlayerBranch.y,
            vx: Math.cos(PlayerBranch.dir) * 10,
            vy: Math.sin(PlayerBranch.dir) * 10,
            life: 60
        });
        this.canShoot = false;
        setTimeout(() => this.canShoot = true, 250); // Fire rate
    },
    update() {
        this.projectiles.forEach((p, i) => {
            p.x += p.vx; p.y += p.vy; p.life--;
            // Collision with walls
            if(WorldBranch.grid[Math.floor(p.y/CONFIG.TILE)][Math.floor(p.x/CONFIG.TILE)] > 0) p.life = 0;
            // Collision with enemies
            EnemyBranch.enemies.forEach(en => {
                if(Math.hypot(p.x - en.x, p.y - en.y) < 20) {
                    en.hp -= 50; p.life = 0;
                    if(en.hp <= 0) en.dead = true;
                }
            });
            if(p.life <= 0) this.projectiles.splice(i, 1);
        });
    }
};
CombatBranch.init();

// --- BRANCH 9: PARTICLE ENGINE (FX) ---
const FXBranch = {
    sparks: [],
    spawn(x, y, color) {
        for(let i=0; i<5; i++) {
            this.sparks.push({ x, y, vx: (Math.random()-0.5)*5, vy: (Math.random()-0.5)*5, t: 20, c: color });
        }
    },
    update() {
        this.sparks.forEach((s, i) => { s.x += s.vx; s.y += s.vy; s.t--; if(s.t <= 0) this.sparks.splice(i, 1); });
    }
};

// --- BRANCH 10: ADVANCED AI TYPES ---
EnemyBranch.spawnGhost = function(x, y) {
    this.enemies.push({ x, y, hp: 50, speed: 3, type: 'stalker' });
};

// --- BRANCH 11: LOOT & INVENTORY ---
const LootBranch = {
    items: [],
    spawn(x, y) { this.items.push({ x, y, type: 'nano_core' }); },
    update() {
        this.items.forEach((it, i) => {
            if(Math.hypot(PlayerBranch.x - it.x, PlayerBranch.y - it.y) < 30) {
                PlayerBranch.hp = Math.min(100, PlayerBranch.hp + 20);
                this.items.splice(i, 1);
            }
        });
    }
};

// --- BRANCH 12: DYNAMIC LIGHTING ENGINE ---
// (Integrated into RenderBranch.draw logic)

// --- BRANCH 13: PROCEDURAL LEVEL CYCLING ---
const ProgressionBranch = {
    floor: 1,
    nextFloor() {
        this.floor++;
        WorldBranch.generate();
        PlayerBranch.x = 96; PlayerBranch.y = 96;
        for(let i=0; i<this.floor + 2; i++) EnemyBranch.spawn(Math.random()*500+200, Math.random()*500+200);
    }
};

// --- BRANCH 14: SOUND SIMULATOR (VISUAL) ---
const AudioBranch = {
    pulse: 0,
    update() { this.pulse = Math.sin(Date.now()/200) * 5; }
};

// --- BRANCH 15: HUD ENHANCEMENTS ---
function updateHUD() {
    document.getElementById('hp').innerText = Math.floor(PlayerBranch.hp);
    document.getElementById('coord').innerText = `FLOOR ${ProgressionBranch.floor} | SEC: ${Math.floor(PlayerBranch.x/64)},${Math.floor(PlayerBranch.y/64)}`;
}
</script>

<script>
<script>
// --- BRANCH 16: MINI-MAP SYSTEM ---
const MapBranch = {
    mCanvas: null, mCtx: null,
    init() {
        this.mCanvas = document.createElement('canvas');
        this.mCanvas.width = 150; this.mCanvas.height = 150;
        this.mCanvas.style.position = 'absolute';
        this.mCanvas.style.top = '20px'; this.mCanvas.style.right = '20px';
        this.mCanvas.style.border = '2px solid #0ff';
        this.mCanvas.style.background = 'rgba(0,0,0,0.5)';
        document.body.appendChild(this.mCanvas);
        this.mCtx = this.mCanvas.getContext('2d');
    },
    draw() {
        this.mCtx.clearRect(0,0,150,150);
        const s = 150 / CONFIG.MAP_SIZE;
        WorldBranch.grid.forEach((row, y) => {
            row.forEach((cell, x) => {
                if(cell > 0) { this.mCtx.fillStyle = '#0ff'; this.mCtx.fillRect(x*s, y*s, s, s); }
            });
        });
        this.mCtx.fillStyle = '#f0f';
        this.mCtx.fillRect((PlayerBranch.x/64)*s-2, (PlayerBranch.y/64)*s-2, 4, 4);
    }
};
MapBranch.init();

// --- BRANCH 17: WEAPON SWAY & SHAKE ---
let swayX = 0, swayY = 0, shakeTime = 0;
function triggerShake(amt) { shakeTime = amt; }

// --- BRANCH 18: BOSS SYSTEM ---
const BossBranch = {
    active: false,
    spawn() {
        EnemyBranch.enemies.push({ x: 500, y: 500, hp: 500, speed: 1, boss: true });
        this.active = true;
    }
};

// --- BRANCH 19: SYSTEM RESET ---
function resetSystem() {
    PlayerBranch.hp = 100; ProgressionBranch.floor = 1;
    WorldBranch.generate(); PlayerBranch.x = 96; PlayerBranch.y = 96;
    EnemyBranch.enemies = []; ProgressionBranch.nextFloor();
}
<script>
// --- BRANCH 16: MINI-MAP SYSTEM ---
const MapBranch = {
    mCanvas: null, mCtx: null,
    init() {
        this.mCanvas = document.createElement('canvas');
        this.mCanvas.width = 150; this.mCanvas.height = 150;
        this.mCanvas.style.position = 'absolute';
        this.mCanvas.style.top = '20px'; this.mCanvas.style.right = '20px';
        this.mCanvas.style.border = '2px solid #0ff';
        this.mCanvas.style.background = 'rgba(0,0,0,0.5)';
        document.body.appendChild(this.mCanvas);
        this.mCtx = this.mCanvas.getContext('2d');
    },
    draw() {
        this.mCtx.clearRect(0,0,150,150);
        const s = 150 / CONFIG.MAP_SIZE;
        WorldBranch.grid.forEach((row, y) => {
            row.forEach((cell, x) => {
                if(cell > 0) { this.mCtx.fillStyle = '#0ff'; this.mCtx.fillRect(x*s, y*s, s, s); }
            });
        });
        this.mCtx.fillStyle = '#f0f';
        this.mCtx.fillRect((PlayerBranch.x/64)*s-2, (PlayerBranch.y/64)*s-2, 4, 4);
    }
};
MapBranch.init();

// --- BRANCH 17: WEAPON SWAY & SHAKE ---
let swayX = 0, swayY = 0, shakeTime = 0;
function triggerShake(amt) { shakeTime = amt; }

// --- BRANCH 18: BOSS SYSTEM ---
const BossBranch = {
    active: false,
    spawn() {
        EnemyBranch.enemies.push({ x: 500, y: 500, hp: 500, speed: 1, boss: true });
        this.active = true;
    }
};

// --- BRANCH 19: SYSTEM RESET ---
function resetSystem() {
    PlayerBranch.hp = 100; ProgressionBranch.floor = 1;
    WorldBranch.generate(); PlayerBranch.x = 96; PlayerBranch.y = 96;
    EnemyBranch.enemies = []; ProgressionBranch.nextFloor();
}

// --- BRANCH 20 & 21: UPDATED ORCHESTRATOR ---
function gameLoop() {
    PlayerBranch.update();
    EnemyBranch.update();
    CombatBranch.update();
    FXBranch.update();
    LootBranch.update();

    EnemyBranch.enemies = EnemyBranch.enemies.filter(en => {
        if(en.dead) { 
            LootBranch.spawn(en.x, en.y); 
            triggerShake(10);
            return false; 
        }
        return true;
    });

    if(EnemyBranch.enemies.length === 0) ProgressionBranch.nextFloor();

    RenderBranch.draw();
    MapBranch.draw();
    updateHUD();
    
    if(PlayerBranch.hp > 0) {
        requestAnimationFrame(gameLoop);
    } else {
        if(confirm("SYSTEM CRITICAL: REBOOT?")) resetSystem();
    }
}
gameLoop();
</script>
</body>
</html>
